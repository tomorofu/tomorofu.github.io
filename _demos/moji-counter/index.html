title: 文字数カウンター
layout: single

permalink: /demos/moji-counter/
---

<style>
.counter-container {
  max-width: 100%;
  margin: 0 0 1.5em 0;
}

.counter-lead {
  margin-bottom: 1em;
  font-size: 1em;
  line-height: 1.7;
}

.counter-card {
  background: #ffffff;
  border: 1px solid #e9ecef;
  border-radius: 0.25rem;
  padding: 1.25em;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
}

.counter-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.75rem;
  margin: 1.25rem 0;
}

.counter-stat {
  background: #f8f9fa;
  border: 1px solid #e9ecef;
  border-radius: 0.25rem;
  padding: 0.9rem 1rem;
}

.counter-label {
  font-size: 0.8em;
  color: #6c757d;
  margin-bottom: 0.35rem;
  line-height: 1.4;
}

.counter-value {
  font-size: 1.8rem;
  font-weight: 600;
  line-height: 1.2;
  color: #2c3e50;
}

.counter-textarea {
  display: block;
  width: 100%;
  min-height: 320px;
  resize: vertical;
  padding: 0.75em 1em;
  font-size: 1em;
  line-height: 1.8;
  color: #494e52;
  background: #ffffff;
  border: 1px solid #b0b8c1;
  border-radius: 0.25rem;
  box-sizing: border-box;
}

.counter-textarea:focus {
  outline: none;
  border-color: #7a8288;
  box-shadow: 0 0 0 0.12rem rgba(122, 130, 136, 0.15);
}

.counter-actions {
  display: flex;
  gap: 0.75rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}

.counter-btn {
  display: inline-block;
  padding: 0.5em 1em;
  font-size: 0.9em;
  font-weight: 600;
  line-height: 1.2;
  text-align: center;
  text-decoration: none;
  color: #fff;
  background: #7a8288;
  border: 1px solid #7a8288;
  border-radius: 0.25rem;
  cursor: pointer;
  transition: all 0.2s ease-in-out;
}

.counter-btn:hover {
  background: #646c72;
  border-color: #646c72;
}

.counter-btn-secondary {
  color: #494e52;
  background: #ffffff;
  border: 1px solid #b0b8c1;
}

.counter-btn-secondary:hover {
  background: #f3f4f5;
  border-color: #7a8288;
  color: #2c3e50;
}

.counter-note {
  margin-top: 0.85rem;
  font-size: 0.85em;
  color: #6c757d;
  line-height: 1.6;
}

@media (max-width: 640px) {
  .counter-card {
    padding: 1rem;
  }

  .counter-value {
    font-size: 1.5rem;
  }

  .counter-textarea {
    min-height: 240px;
  }
}
</style>

<div class="counter-container">
  <p class="counter-lead">
    入力した文章の文字数をリアルタイムでカウントしまうす．
  </p>

  <div class="counter-card">

    <textarea id="textInput" class="counter-textarea" placeholder="ここに文章を入力して"></textarea>

    <div class="counter-stats">
      <div class="counter-stat">
        <div class="counter-label">文字数</div>
        <div id="charCount" class="counter-value">0</div>
      </div>

      <div class="counter-stat">
        <div class="counter-label">空白と改行を除く文字数</div>
        <div id="trimmedCharCount" class="counter-value">0</div>
      </div>

      <div class="counter-stat">
        <div class="counter-label">行数</div>
        <div id="lineCount" class="counter-value">0</div>
      </div>

      <div class="counter-stat">
        <div class="counter-label">UTF-8バイト数</div>
        <div id="byteCount" class="counter-value">0</div>
      </div>
    </div>

    <div class="counter-actions">
      <button id="copyButton" class="counter-btn" type="button">入力内容をコピー</button>
      <button id="clearButton" class="counter-btn counter-btn-secondary" type="button">消す</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  const trimmedCharCount = document.getElementById('trimmedCharCount');
  const lineCount = document.getElementById('lineCount');
  const byteCount = document.getElementById('byteCount');
  const clearButton = document.getElementById('clearButton');
  const copyButton = document.getElementById('copyButton');

  function updateCounts() {
    const text = textInput.value;
    charCount.textContent = text.length.toLocaleString('ja-JP');
    trimmedCharCount.textContent = text.replace(/[\s\u3000]/g, '').length.toLocaleString('ja-JP');
    lineCount.textContent = (text.length === 0 ? 0 : text.split(/\r\n|\r|\n/).length).toLocaleString('ja-JP');
    byteCount.textContent = new TextEncoder().encode(text).length.toLocaleString('ja-JP');
  }

  textInput.addEventListener('input', updateCounts);

  clearButton.addEventListener('click', function () {
    textInput.value = '';
    updateCounts();
    textInput.focus();
  });

  copyButton.addEventListener('click', async function () {
    try {
      await navigator.clipboard.writeText(textInput.value);
      copyButton.textContent = 'コピーしました';
      setTimeout(function () {
        copyButton.textContent = '入力内容をコピー';
      }, 1200);
    } catch (e) {
      copyButton.textContent = 'コピー失敗';
      setTimeout(function () {
        copyButton.textContent = '入力内容をコピー';
      }, 1200);
    }
  });

  updateCounts();
});
</script>
